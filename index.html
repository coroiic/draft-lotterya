<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNL | S46 DRAFT BOARD</title>
    <style>
        :root {
            --hnl-gold: #c9a05a;
            --neon-cyan: #00f2ff;
            --panthers-red: #ff0000;
            /* The "Not Too Dark, Not Too Light" Base */
            --bg-slate: #1a222b; 
            --panel-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-slate);
            color: white;
            font-family: 'Segoe UI', Impact, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Atmosphere Glow */
            background: 
                radial-gradient(circle at 50% 0%, rgba(0, 242, 255, 0.15) 0%, transparent 70%),
                linear-gradient(180deg, #1a222b 0%, #0d1117 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        header {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            padding: 30px 80px;
            border-bottom: 6px solid var(--hnl-gold);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .hnl-shield {
            background: linear-gradient(135deg, var(--hnl-gold), #8a6d3b);
            color: #000;
            font-weight: 900;
            padding: 20px 30px;
            font-size: 3rem;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            margin-right: 40px;
            box-shadow: 0 0 30px var(--hnl-gold);
        }

        .title-group h1 { 
            margin: 0; 
            font-size: 2.8rem; 
            letter-spacing: 5px; 
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--neon-cyan);
        }

        .main-layout { 
            display: grid; 
            grid-template-columns: 550px 1fr; 
            gap: 60px; 
            padding: 60px; 
            max-width: 1900px; 
            margin: auto; 
            flex: 1; 
            width: 100%;
            box-sizing: border-box;
        }

        .panel {
            background: var(--panel-bg);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 40px;
            backdrop-filter: blur(30px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        h2 { 
            font-size: 1.5rem; 
            letter-spacing: 6px; 
            color: var(--hnl-gold); 
            margin-bottom: 40px; 
            text-transform: uppercase;
            border-left: 8px solid var(--neon-cyan);
            padding-left: 20px;
        }

        .input-stack { display: flex; flex-direction: column; gap: 25px; margin-bottom: 50px; }
        
        input { 
            padding: 25px; 
            border-radius: 20px; 
            border: 3px solid rgba(255,255,255,0.1); 
            font-size: 1.5rem; 
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-weight: bold;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 25px var(--neon-cyan);
            outline: none;
        }

        .btn-add { 
            background: transparent; 
            border: 4px solid var(--neon-cyan); 
            color: var(--neon-cyan); 
            padding: 20px; 
            cursor: pointer; 
            font-weight: 900; 
            border-radius: 20px;
            text-transform: uppercase;
            font-size: 1.3rem;
            letter-spacing: 3px;
        }
        .btn-add:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 40px var(--neon-cyan); }

        .btn-generate { 
            background: linear-gradient(90deg, var(--hnl-gold), #fff, var(--hnl-gold));
            background-size: 200% auto;
            color: #000; 
            width: 100%; 
            padding: 30px; 
            font-size: 2rem; 
            font-weight: 900; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer;
            box-shadow: 0 15px 50px rgba(201, 160, 90, 0.4);
            transition: 0.5s;
            text-transform: uppercase;
        }
        .btn-generate:hover { background-position: right center; transform: translateY(-5px); }

        .result-card {
            background: rgba(255, 255, 255, 0.07);
            padding: 45px;
            border-radius: 35px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-card:hover:not(.revealed) { 
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--neon-cyan);
            transform: scale(1.02);
        }

        .reveal-tag { color: var(--neon-cyan); font-weight: 900; letter-spacing: 5px; font-size: 1.1rem; }

        .team-name-big { 
            display: none; 
            font-size: 5rem; 
            font-weight: 900; 
            text-transform: uppercase;
            width: 100%;
            text-align: center;
        }

        .result-card.revealed .team-name-big { display: block; animation: zoomIn 0.4s ease; }
        .result-card.revealed .reveal-tag, .result-card.revealed .pick-label { display: none; }

        @keyframes zoomIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .pick-label { font-size: 2rem; font-weight: 900; color: rgba(255,255,255,0.15); }

        footer { text-align: center; padding: 60px; border-top: 1px solid rgba(255,255,255,0.05); }
        .made-by { font-size: 1.2rem; color: var(--hnl-gold); font-weight: 900; letter-spacing: 10px; text-transform: uppercase; opacity: 0.6; }

        table { width: 100%; border-collapse: collapse; font-size: 1.6rem; }
        td { padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <header>
        <div class="hnl-shield">HNL</div>
        <div class="title-group">
            <h1>S46 DRAFT LOTTERY</h1>
        </div>
    </header>

    <main class="main-layout">
        <section class="panel">
            <h2>COMMISSIONER</h2>
            <div class="input-stack">
                <input type="text" id="tIn" placeholder="TEAM NAME">
                <input type="number" id="oIn" placeholder="ODDS %">
                <button class="btn-add" id="addBtn">ADD TEAM TO POOL</button>
            </div>
            
            <div style="max-height: 450px; overflow-y: auto;">
                <table>
                    <tbody id="teamList"></tbody>
                </table>
            </div>

            <button class="btn-generate" id="drawBtn" style="margin-top:40px;">RUN S46 DRAW</button>
        </section>

        <section class="panel">
            <h2>DRAFT BOARD</h2>
            <div id="results">
                <div style="text-align: center; padding: 200px; color: rgba(255,255,255,0.1); font-size: 2.5rem; font-weight: 900;">AWAITING SEEDS...</div>
            </div>
        </section>
    </main>

    <footer>
        <div class="made-by">Made by Coroic</div>
    </footer>

    <script>
        const hnlTeams = {
            "PANTHERS": "#ff0000", // Bloody Red confirmed
            "CANES": "#cc0000",
            "HURRICANES": "#cc0000",
            "DUCKS": "#f47a38",
            "KRAKEN": "#00f2ff",
            "STARS": "#006439",
            "RANGERS": "#0038a8",
            "DEFAULT": "#00f2ff"
        };

        let teams = [];

        document.getElementById('addBtn').onclick = () => {
            const name = document.getElementById('tIn').value.toUpperCase();
            const odds = parseFloat(document.getElementById('oIn').value);
            if (name && odds) {
                teams.push({ name, odds });
                updateList();
                document.getElementById('tIn').value = "";
                document.getElementById('oIn').value = "";
            }
        };

        function updateList() {
            const list = document.getElementById('teamList');
            list.innerHTML = teams.map((t, i) => `
                <tr>
                    <td style="font-weight:900;">${t.name}</td>
                    <td style="color:var(--neon-cyan);">${t.odds}%</td>
                    <td style="text-align:right"><button onclick="del(${i})" style="color:red; background:none; border:none; cursor:pointer; font-size:2rem;">✕</button></td>
                </tr>
            `).join('');
        }

        function del(i) { teams.splice(i, 1); updateList(); }

        document.getElementById('drawBtn').onclick = () => {
            if (teams.length === 0) return;
            const resArea = document.getElementById('results');
            resArea.innerHTML = "";
            
            let pool = JSON.parse(JSON.stringify(teams));
            let order = [];

            while (pool.length > 0) {
                let total = pool.reduce((s, t) => s + t.odds, 0);
                let r = Math.random() * total;
                let s = 0;
                for (let i = 0; i < pool.length; i++) {
                    s += pool[i].odds;
                    if (r <= s) {
                        order.push(pool.splice(i, 1)[0]);
                        break;
                    }
                }
            }

            order.reverse().forEach((team, i) => {
                const pickNum = order.length - i;
                const color = hnlTeams[team.name] || hnlTeams["DEFAULT"];
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <span class="pick-label">#${pickNum}</span>
                    <span class="reveal-tag">CLICK TO REVEAL</span>
                    <div class="team-name-big" style="color:${color}; text-shadow: 0 0 40px ${color}">
                        <div style="font-size: 1.5rem; color: #fff; letter-spacing: 10px; opacity: 0.4; margin-bottom: 15px;">OVERALL PICK #${pickNum}</div>
                        ${team.name}
                    </div>
                `;
                card.onclick = function() {
                    this.classList.add('revealed');
                    this.style.borderLeft = `30px solid ${color}`;
                    this.style.background = `rgba(255,255,255,0.1)`;
                };
                resArea.appendChild(card);
            });
        };
    </script>
</body>
</html>
