<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNL | S46 DRAFT LOTTERY</title>
    <style>
        :root {
            --hnl-gold: #c9a05a;
            --neon-cyan: #00f2ff;
            --panthers-red: #ff0000;
            --midnight: #080a0c;
            --panel-dark: rgba(20, 25, 30, 0.8);
        }

        body {
            background-color: var(--midnight);
            color: white;
            font-family: 'Impact', 'Arial Black', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Deep Heavy Atmosphere */
            background: 
                radial-gradient(circle at 50% -20%, rgba(0, 242, 255, 0.2) 0%, transparent 60%),
                radial-gradient(circle at 50% 120%, rgba(201, 160, 90, 0.1) 0%, transparent 50%),
                linear-gradient(180deg, #080a0c 0%, #030405 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        header {
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            padding: 40px 100px;
            border-bottom: 8px solid var(--hnl-gold);
            box-shadow: 0 10px 60px rgba(0,0,0,0.8);
        }

        .hnl-shield {
            background: linear-gradient(135deg, var(--hnl-gold), #8a6d3b);
            color: #000;
            padding: 25px 35px;
            font-size: 3.5rem;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            margin-right: 50px;
            box-shadow: 0 0 40px var(--hnl-gold);
        }

        .header-title h1 { 
            margin: 0; 
            font-size: 3.5rem; 
            letter-spacing: 8px; 
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--neon-cyan);
        }

        .main-layout { 
            display: grid; 
            grid-template-columns: 600px 1fr; 
            gap: 60px; 
            padding: 60px; 
            max-width: 2200px; 
            margin: auto; 
            flex: 1; 
            width: 100%;
            box-sizing: border-box;
        }

        .panel {
            background: var(--panel-dark);
            border: 3px solid rgba(255, 255, 255, 0.05);
            padding: 60px;
            border-radius: 50px;
            backdrop-filter: blur(40px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        h2 { 
            font-size: 1.8rem; 
            letter-spacing: 8px; 
            color: var(--hnl-gold); 
            margin-bottom: 50px; 
            text-transform: uppercase;
            border-left: 12px solid var(--neon-cyan);
            padding-left: 25px;
        }

        .input-group { display: flex; flex-direction: column; gap: 30px; margin-bottom: 60px; }
        
        input { 
            padding: 30px; 
            border-radius: 25px; 
            border: 4px solid rgba(255,255,255,0.05); 
            font-size: 1.8rem; 
            background: rgba(0,0,0,0.5);
            color: #fff;
            transition: 0.3s;
            font-family: sans-serif;
        }

        input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px var(--neon-cyan);
            outline: none;
        }

        .btn-add { 
            background: transparent; 
            border: 5px solid var(--neon-cyan); 
            color: var(--neon-cyan); 
            padding: 25px; 
            cursor: pointer; 
            font-weight: 900; 
            border-radius: 25px;
            text-transform: uppercase;
            font-size: 1.6rem;
            letter-spacing: 4px;
        }
        .btn-add:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 50px var(--neon-cyan); }

        .btn-draw { 
            background: linear-gradient(90deg, var(--hnl-gold), #fff, var(--hnl-gold));
            background-size: 200% auto;
            color: #000; 
            width: 100%; 
            padding: 40px; 
            font-size: 2.5rem; 
            font-weight: 900; 
            border: none; 
            border-radius: 30px; 
            cursor: pointer;
            box-shadow: 0 20px 60px rgba(201, 160, 90, 0.4);
            transition: 0.5s;
            text-transform: uppercase;
        }
        .btn-draw:hover { background-position: right center; transform: scale(1.02); }

        .result-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 60px;
            border-radius: 40px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 3px solid rgba(255,255,255,0.05);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-card:hover:not(.revealed) { 
            background: rgba(0, 242, 255, 0.08);
            border-color: var(--neon-cyan);
            transform: scale(1.03);
        }

        .reveal-text { color: var(--neon-cyan); font-weight: 900; letter-spacing: 8px; font-size: 1.4rem; }

        .team-reveal { 
            display: none; 
            font-size: 7rem; 
            font-weight: 900; 
            text-transform: uppercase;
            width: 100%;
            text-align: center;
            letter-spacing: -3px;
        }

        .result-card.revealed .team-reveal { display: block; animation: powerOn 0.3s ease; }
        .result-card.revealed .reveal-text, .result-card.revealed .pick-num { display: none; }

        @keyframes powerOn { 0% { opacity: 0; filter: brightness(5); } 100% { opacity: 1; filter: brightness(1); } }

        .pick-num { font-size: 3rem; color: rgba(255,255,255,0.05); }

        .footer-sig { text-align: center; padding: 40px; margin-top: 50px; border-top: 2px solid rgba(255,255,255,0.03); }
        .coroic { font-size: 1.2rem; color: var(--hnl-gold); font-weight: 900; letter-spacing: 15px; text-transform: uppercase; opacity: 0.4; }

        table { width: 100%; border-collapse: collapse; font-size: 2rem; }
        td { padding: 25px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <header>
        <div class="hnl-shield">HNL</div>
        <div class="header-title">
            <h1>S46 DRAFT LOTTERY</h1>
        </div>
    </header>

    <main class="main-layout">
        <section class="panel">
            <h2>COMMISSIONER</h2>
            <div class="input-group">
                <input type="text" id="tName" placeholder="TEAM NAME">
                <input type="number" id="tOdds" placeholder="ODDS %">
                <button class="btn-add" id="addBtn">ADD TEAM</button>
            </div>
            
            <div style="max-height: 500px; overflow-y: auto;">
                <table id="teamTable"></table>
            </div>

            <button class="btn-draw" id="drawBtn" style="margin-top:50px;">RUN S46 LOTTERY</button>
        </section>

        <section class="panel">
            <h2>DRAFT BOARD</h2>
            <div id="results">
                <div style="text-align: center; padding: 250px; color: rgba(255,255,255,0.03); font-size: 3rem; font-weight: 900;">AWAITING SYSTEM...</div>
            </div>
            <div class="footer-sig">
                <div class="coroic">Made by Coroic</div>
            </div>
        </section>
    </main>

    <script>
        const hnlColors = {
            "PANTHERS": "#ff0000", // Bloody Red confirmed
            "CANES": "#cc0000",
            "HURRICANES": "#cc0000",
            "DUCKS": "#f47a38",
            "STARS": "#006439",
            "RANGERS": "#0038a8",
            "KRAKEN": "#00f2ff",
            "DEFAULT": "#00f2ff"
        };

        let teams = [];

        document.getElementById('addBtn').onclick = () => {
            const name = document.getElementById('tName').value.toUpperCase();
            const odds = parseFloat(document.getElementById('tOdds').value);
            if (name && odds) {
                teams.push({ name, odds });
                update();
                document.getElementById('tName').value = "";
                document.getElementById('tOdds').value = "";
            }
        };

        function update() {
            const list = document.getElementById('teamTable');
            list.innerHTML = teams.map((t, i) => `
                <tr>
                    <td style="font-weight:900;">${t.name}</td>
                    <td style="color:var(--neon-cyan);">${t.odds}%</td>
                    <td style="text-align:right"><button onclick="del(${i})" style="color:red; background:none; border:none; cursor:pointer; font-size:2.5rem;">✕</button></td>
                </tr>
            `).join('');
        }

        function del(i) { teams.splice(i, 1); update(); }

        document.getElementById('drawBtn').onclick = () => {
            if (teams.length === 0) return;
            const resArea = document.getElementById('results');
            resArea.innerHTML = "";
            
            let pool = JSON.parse(JSON.stringify(teams));
            let order = [];

            while (pool.length > 0) {
                let total = pool.reduce((s, t) => s + t.odds, 0);
                let r = Math.random() * total;
                let s = 0;
                for (let i = 0; i < pool.length; i++) {
                    s += pool[i].odds;
                    if (r <= s) {
                        order.push(pool.splice(i, 1)[0]);
                        break;
                    }
                }
            }

            order.reverse().forEach((team, i) => {
                const pickNum = order.length - i;
                const color = hnlColors[team.name] || hnlColors["DEFAULT"];
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <span class="pick-num">PICK #${pickNum}</span>
                    <span class="reveal-text">REVEAL SELECTION</span>
                    <div class="team-reveal" style="color:${color}; text-shadow: 0 0 60px ${color}">
                        <div style="font-size: 1.5rem; color: #fff; letter-spacing: 12px; opacity: 0.3; margin-bottom: 10px;">DRAFT PICK #${pickNum}</div>
                        ${team.name}
                    </div>
                `;
                card.onclick = function() {
                    this.classList.add('revealed');
                    this.style.borderLeft = `40px solid ${color}`;
                    this.style.background = `rgba(255,255,255,0.06)`;
                };
                resArea.appendChild(card);
            });
        };
    </script>
</body>
</html>
