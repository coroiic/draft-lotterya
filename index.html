<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNL S46 | NEON DRAFT LOTTERY</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --hnl-gold: #c9a05a;
            --panthers-red: #ff0000;
            --dark-void: #020508;
            --ice-overlay: rgba(0, 242, 255, 0.05);
        }

        body {
            background-color: var(--dark-void);
            color: white;
            font-family: 'Arial Black', Gadget, sans-serif;
            margin: 0;
            /* High-Contrast Neon Ice Background */
            background: 
                radial-gradient(circle at 50% -20%, rgba(0, 242, 255, 0.25) 0%, transparent 60%),
                linear-gradient(180deg, #020508 0%, #05101a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 30px 60px;
            background: rgba(0,0,0,0.9);
            border-bottom: 6px solid var(--hnl-gold);
            box-shadow: 0 0 50px rgba(201, 160, 90, 0.4);
            display: flex;
            align-items: center;
        }

        .hnl-logo {
            background: var(--hnl-gold);
            color: #000;
            padding: 15px 25px;
            font-size: 2.8rem;
            font-weight: 900;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            margin-right: 30px;
            box-shadow: 0 0 30px var(--hnl-gold);
        }

        .header-text h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--neon-cyan);
        }

        .layout {
            display: grid;
            grid-template-columns: 500px 1fr;
            gap: 50px;
            padding: 60px;
            max-width: 1800px;
            margin: auto;
            width: 100%;
            box-sizing: border-box;
            flex: 1;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(0, 242, 255, 0.2);
            border-radius: 40px;
            padding: 45px;
            backdrop-filter: blur(25px);
            box-shadow: 0 0 60px rgba(0,0,0,0.7);
        }

        h2 {
            font-size: 1.4rem;
            color: var(--hnl-gold);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 35px;
            border-left: 6px solid var(--neon-cyan);
            padding-left: 15px;
        }

        .input-stack { display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }
        
        input {
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.1);
            padding: 22px;
            border-radius: 15px;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
            outline: none;
        }

        .btn-add {
            background: transparent;
            border: 3px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 900;
            border-radius: 15px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-add:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 30px var(--neon-cyan); }

        .btn-draw {
            background: linear-gradient(90deg, var(--hnl-gold), #fff, var(--hnl-gold));
            background-size: 200% auto;
            border: none;
            padding: 25px;
            font-size: 1.8rem;
            font-weight: 900;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 0 40px rgba(201, 160, 90, 0.5);
            transition: 0.5s;
        }

        .btn-draw:hover { background-position: right center; transform: scale(1.03); }

        .result-card {
            background: rgba(255,255,255,0.05);
            margin-bottom: 25px;
            border-radius: 30px;
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-card:hover:not(.revealed) {
            transform: scale(1.02);
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--neon-cyan);
        }

        .pick-tag { font-size: 2rem; font-weight: 900; color: rgba(255,255,255,0.1); }
        .reveal-btn { color: var(--neon-cyan); font-weight: 900; letter-spacing: 4px; font-size: 1rem; }

        .team-reveal {
            display: none;
            font-size: 4.5rem;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
            letter-spacing: -2px;
        }

        .result-card.revealed .team-reveal { display: block; animation: neonFlicker 0.4s ease; }
        .result-card.revealed .pick-tag, .result-card.revealed .reveal-btn { display: none; }

        @keyframes neonFlicker {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            letter-spacing: 6px;
            color: var(--hnl-gold);
            font-weight: 900;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* Custom Table Styling */
        table { width: 100%; font-size: 1.5rem; margin-top: 20px; }
        td { padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<header>
    <div class="hnl-logo">HNL</div>
    <div class="header-text">
        <h1>S46 DRAFT LOTTERY</h1>
    </div>
</header>

<div class="layout">
    <section class="glass-panel">
        <h2>COMMISSIONER TOOLS</h2>
        <div class="input-stack">
            <input type="text" id="tName" placeholder="TEAM NAME">
            <input type="number" id="tOdds" placeholder="LOTTERY %">
            <button class="btn-add" id="addTeam">ADD TO DRAW</button>
        </div>
        <div style="max-height: 400px; overflow-y: auto;">
            <table id="entryTable"></table>
        </div>
        <button class="btn-draw" id="startDraw">EXECUTE S46 DRAW</button>
    </section>

    <section class="glass-panel">
        <h2 style="border-color: var(--hnl-gold);">DRAFT BOARD</h2>
        <div id="resultsBoard">
            <div style="text-align:center; padding: 150px; font-size: 2rem; opacity: 0.1;">READY FOR S46 DATA</div>
        </div>
        <div style="text-align: center; margin-top: 50px;">
            <p style="font-size: 0.9rem; color: #444; font-weight: 900;">Made by Coroic</p>
        </div>
    </section>
</div>

<footer>S46 OFFICIAL DRAFT</footer>

<script>
    // THE BLOODY PANTHERS ARE RED
    const hnlColors = {
        "PANTHERS": "#ff0000",
        "CANES": "#cc0000",
        "HURRICANES": "#cc0000",
        "DUCKS": "#f47a38",
        "KRAKEN": "#00f2ff",
        "DEFAULT": "#00f2ff"
    };

    let entries = [];

    document.getElementById('addTeam').onclick = () => {
        const name = document.getElementById('tName').value.toUpperCase();
        const odds = parseFloat(document.getElementById('tOdds').value);
        if (name && odds) {
            entries.push({ name, odds });
            renderEntries();
            document.getElementById('tName').value = "";
            document.getElementById('tOdds').value = "";
        }
    };

    function renderEntries() {
        const table = document.getElementById('entryTable');
        table.innerHTML = entries.map((t, i) => `
            <tr>
                <td>${t.name}</td>
                <td style="color:var(--neon-cyan)">${t.odds}%</td>
                <td style="text-align:right">
                    <button onclick="removeTeam(${i})" style="color:red; background:none; border:none; cursor:pointer; font-size:1.8rem;">✕</button>
                </td>
            </tr>
        `).join('');
    }

    function removeTeam(i) { entries.splice(i, 1); renderEntries(); }

    document.getElementById('startDraw').onclick = () => {
        if (entries.length === 0) return;
        const board = document.getElementById('resultsBoard');
        board.innerHTML = "";

        let pool = JSON.parse(JSON.stringify(entries));
        let results = [];

        while (pool.length > 0) {
            let total = pool.reduce((s, t) => s + t.odds, 0);
            let r = Math.random() * total;
            let s = 0;
            for (let i = 0; i < pool.length; i++) {
                s += pool[i].odds;
                if (r <= s) {
                    results.push(pool.splice(i, 1)[0]);
                    break;
                }
            }
        }

        results.reverse().forEach((team, i) => {
            const pNum = results.length - i;
            const color = hnlColors[team.name] || hnlColors["DEFAULT"];
            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = `
                <span class="pick-tag">#${pNum}</span>
                <span class="reveal-btn">CLICK TO REVEAL</span>
                <div class="team-reveal" style="color:${color}; text-shadow: 0 0 40px ${color}">
                    <div style="font-size: 1.2rem; color: #fff; letter-spacing: 8px; opacity: 0.4; margin-bottom: 10px;">PICK #${pNum}</div>
                    ${team.name}
                </div>
            `;
            card.onclick = function() {
                this.classList.add('revealed');
                this.style.borderLeft = `20px solid ${color}`;
                this.style.background = `rgba(255,255,255,0.08)`;
            };
            board.appendChild(card);
        });
    };
</script>

</body>
</html>
