<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNL S46 | DRAFT BOARD</title>
    <style>
        :root {
            --hnl-gold: #c9a05a;
            --panthers-red: #cc0000;
            --ice-slate: #0f1216;
            --panel-matte: rgba(255, 255, 255, 0.03);
            --text-dim: #a0a0a0;
        }

        body {
            background-color: var(--ice-slate);
            color: #eeeeee;
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Subdued, low-strain background */
            background: linear-gradient(180deg, #12161b 0%, #080a0c 100%);
        }

        header {
            background: #000;
            display: flex;
            align-items: center;
            padding: 30px 80px;
            border-bottom: 5px solid var(--hnl-gold);
            box-shadow: 0 5px 30px rgba(0,0,0,0.5);
        }

        .hnl-shield {
            background: var(--hnl-gold);
            color: #000;
            padding: 20px 30px;
            font-size: 3rem;
            font-weight: 900;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            margin-right: 40px;
        }

        .header-title h1 { 
            margin: 0; 
            font-size: 3rem; 
            letter-spacing: 5px; 
            text-transform: uppercase;
        }

        .main-layout { 
            display: grid; 
            grid-template-columns: 550px 1fr; 
            gap: 50px; 
            padding: 60px; 
            max-width: 2000px; 
            margin: auto; 
            width: 100%;
            box-sizing: border-box;
            flex: 1;
        }

        .panel {
            background: var(--panel-matte);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 35px;
            backdrop-filter: blur(20px);
        }

        h2 { 
            font-size: 1.6rem; 
            letter-spacing: 6px; 
            color: var(--hnl-gold); 
            margin-bottom: 45px; 
            text-transform: uppercase;
            border-left: 10px solid var(--hnl-gold);
            padding-left: 20px;
        }

        .input-group { display: flex; flex-direction: column; gap: 25px; margin-bottom: 50px; }
        
        input { 
            padding: 25px; 
            border-radius: 15px; 
            border: 2px solid rgba(255,255,255,0.1); 
            font-size: 1.6rem; 
            background: #000;
            color: #fff;
            transition: 0.2s;
        }

        input:focus { border-color: var(--hnl-gold); outline: none; }

        .btn-add { 
            background: #222; 
            border: none; 
            color: white; 
            padding: 20px; 
            cursor: pointer; 
            font-weight: 900; 
            border-radius: 15px;
            text-transform: uppercase;
            font-size: 1.3rem;
            letter-spacing: 2px;
        }
        .btn-add:hover { background: #333; }

        .btn-draw { 
            background: var(--hnl-gold);
            color: #000; 
            width: 100%; 
            padding: 35px; 
            font-size: 2.2rem; 
            font-weight: 900; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }
        .btn-draw:hover { transform: translateY(-3px); filter: brightness(1.1); }

        .result-card {
            background: rgba(255, 255, 255, 0.02);
            padding: 50px;
            border-radius: 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }

        .result-card:hover:not(.revealed) { 
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--hnl-gold);
        }

        .reveal-hint { color: var(--text-dim); font-weight: 900; letter-spacing: 6px; font-size: 1.1rem; }

        .team-reveal { 
            display: none; 
            font-size: 6rem; 
            font-weight: 900; 
            text-transform: uppercase;
            width: 100%;
            text-align: center;
        }

        .result-card.revealed .team-reveal { display: block; }
        .result-card.revealed .reveal-hint, .result-card.revealed .pick-num { display: none; }

        .pick-num { font-size: 2.5rem; color: rgba(255,255,255,0.05); font-weight: 900; }

        footer { text-align: center; padding: 60px; color: var(--hnl-gold); font-size: 1.2rem; font-weight: 900; letter-spacing: 12px; opacity: 0.4; }

        table { width: 100%; border-collapse: collapse; font-size: 1.8rem; }
        td { padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <header>
        <div class="hnl-shield">HNL</div>
        <div class="header-title">
            <h1>S46 DRAFT LOTTERY</h1>
        </div>
    </header>

    <main class="main-layout">
        <section class="panel">
            <h2>COMMISSIONER</h2>
            <div class="input-group">
                <input type="text" id="tName" placeholder="TEAM NAME">
                <input type="number" id="tOdds" placeholder="ODDS %">
                <button class="btn-add" id="addBtn">ADD TEAM</button>
            </div>
            <div style="max-height: 450px; overflow-y: auto;">
                <table id="teamTable"></table>
            </div>
            <button class="btn-draw" id="drawBtn" style="margin-top:40px;">GENERATE S46 DRAFT</button>
        </section>

        <section class="panel">
            <h2>DRAFT BOARD</h2>
            <div id="results">
                <div style="text-align: center; padding: 200px; color: rgba(255,255,255,0.03); font-size: 3rem; font-weight: 900;">AWAITING DATA</div>
            </div>
            <div style="text-align: center; margin-top: 50px; font-size: 0.8rem; color: #444; letter-spacing: 8px; text-transform: uppercase;">Made by Coroic</div>
        </section>
    </main>

    <footer>S46 OFFICIAL</footer>

    <script>
        const hnlColors = {
            "PANTHERS": "#cc0000",
            "CANES": "#cc0000",
            "HURRICANES": "#cc0000",
            "DUCKS": "#f47a38",
            "DEFAULT": "#c9a05a"
        };

        let teams = [];

        document.getElementById('addBtn').onclick = () => {
            const name = document.getElementById('tName').value.toUpperCase();
            const odds = parseFloat(document.getElementById('tOdds').value);
            if (name && odds) {
                teams.push({ name, odds });
                updateList();
                document.getElementById('tName').value = "";
                document.getElementById('tOdds').value = "";
            }
        };

        function updateList() {
            const list = document.getElementById('teamTable');
            list.innerHTML = teams.map((t, i) => `
                <tr>
                    <td>${t.name}</td>
                    <td style="color:var(--hnl-gold);">${t.odds}%</td>
                    <td style="text-align:right"><button onclick="del(${i})" style="color:red; background:none; border:none; cursor:pointer; font-size:2.2rem;">✕</button></td>
                </tr>
            `).join('');
        }

        function del(i) { teams.splice(i, 1); updateList(); }

        document.getElementById('drawBtn').onclick = () => {
            if (teams.length === 0) return;
            const area = document.getElementById('results');
            area.innerHTML = "";
            
            let pool = JSON.parse(JSON.stringify(teams));
            let order = [];

            while (pool.length > 0) {
                let total = pool.reduce((s, t) => s + t.odds, 0);
                let r = Math.random() * total;
                let s = 0;
                for (let i = 0; i < pool.length; i++) {
                    s += pool[i].odds;
                    if (r <= s) {
                        order.push(pool.splice(i, 1)[0]);
                        break;
                    }
                }
            }

            order.reverse().forEach((team, i) => {
                const pickNum = order.length - i;
                const color = hnlColors[team.name] || hnlColors["DEFAULT"];
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <span class="pick-num">#${pickNum}</span>
                    <span class="reveal-hint">CLICK TO REVEAL</span>
                    <div class="team-reveal" style="color:${color};">
                        <div style="font-size: 1.4rem; color: #666; letter-spacing: 10px; margin-bottom: 10px;">PICK #${pickNum}</div>
                        ${team.name}
                    </div>
                `;
                card.onclick = function() {
                    this.classList.add('revealed');
                    this.style.borderLeft = `30px solid ${color}`;
                    this.style.background = `rgba(255,255,255,0.05)`;
                };
                area.appendChild(card);
            });
        };
    </script>
</body>
</html>
