<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNL | S46 DRAFT LOTTERY</title>
    <style>
        :root {
            --hnl-gold: #c9a05a;
            --neon-cyan: #00f2ff;
            --dark-bg: #050a0f;
            --card-bg: rgba(255, 255, 255, 0.05);
            --panthers-red: #ff0000;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Segoe UI', Impact, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Neon Grid/Ice Background */
            background: 
                radial-gradient(circle at 50% 0%, rgba(0, 242, 255, 0.15) 0%, transparent 70%),
                linear-gradient(rgba(5, 10, 15, 0.9), rgba(5, 10, 15, 0.9)),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            overflow-x: hidden;
        }

        header {
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            padding: 25px 60px;
            border-bottom: 4px solid var(--hnl-gold);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        .hnl-shield {
            background: linear-gradient(135deg, var(--hnl-gold), #8a6d3b);
            color: #000;
            font-weight: 900;
            padding: 15px 25px;
            font-size: 2.5rem;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            margin-right: 30px;
            box-shadow: 0 0 20px var(--hnl-gold);
        }

        .title-container h1 { 
            margin: 0; 
            font-size: 2.2rem; 
            letter-spacing: 4px; 
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .main-layout { 
            display: grid; 
            grid-template-columns: 450px 1fr; 
            gap: 40px; 
            padding: 50px; 
            max-width: 1700px; 
            margin: auto; 
            flex: 1; 
        }

        .panel {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 { 
            font-size: 1.2rem; 
            letter-spacing: 5px; 
            color: var(--hnl-gold); 
            margin-bottom: 30px; 
            text-transform: uppercase;
            border-left: 5px solid var(--neon-cyan);
            padding-left: 15px;
        }

        .input-group { display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }
        
        input { 
            padding: 20px; 
            border-radius: 15px; 
            border: 2px solid rgba(255,255,255,0.1); 
            font-size: 1.2rem; 
            background: rgba(0,0,0,0.4);
            color: #fff;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
            outline: none;
        }

        .btn-add { 
            background: transparent; 
            border: 2px solid var(--neon-cyan); 
            color: var(--neon-cyan); 
            padding: 15px; 
            cursor: pointer; 
            font-weight: 900; 
            border-radius: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-add:hover { background: var(--neon-cyan); color: #000; }

        .btn-draw { 
            background: linear-gradient(90deg, var(--hnl-gold), #fff, var(--hnl-gold));
            background-size: 200% auto;
            color: #000; 
            width: 100%; 
            padding: 25px; 
            font-size: 1.5rem; 
            font-weight: 900; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(201, 160, 90, 0.4);
            transition: 0.5s;
        }

        .btn-draw:hover { background-position: right center; transform: scale(1.02); }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 35px;
            border-radius: 25px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-card:hover:not(.revealed) { 
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--neon-cyan);
            transform: scale(1.03);
        }

        .reveal-hint { color: var(--neon-cyan); font-weight: 900; letter-spacing: 3px; font-size: 0.9rem; }

        .team-reveal { 
            display: none; 
            font-size: 3.5rem; 
            font-weight: 900; 
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .result-card.revealed .team-reveal { display: block; }
        .result-card.revealed .reveal-hint, .result-card.revealed .pick-tag { display: none; }

        .pick-tag { font-size: 1.5rem; font-weight: 900; color: rgba(255,255,255,0.2); }

        footer { text-align: center; padding: 40px; font-size: 1rem; letter-spacing: 5px; color: var(--hnl-gold); opacity: 0.6; }

        /* Scrollbar Neon */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--dark-bg); }
        ::-webkit-scrollbar-thumb { background: var(--hnl-gold); border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div class="hnl-shield">HNL</div>
    <div class="title-container">
        <h1>S46 DRAFT LOTTERY</h1>
    </div>
</header>

<main class="main-layout">
    <section class="panel">
        <h2>COMMISSIONER</h2>
        <div class="input-group">
            <input type="text" id="nameIn" placeholder="TEAM NAME">
            <input type="number" id="oddsIn" placeholder="ODDS %">
            <button class="btn-add" id="addBtn">ADD TO POOL</button>
        </div>
        <div style="max-height: 400px; overflow-y: auto;">
            <table style="width: 100%; font-size: 1.3rem;">
                <tbody id="poolTable"></tbody>
            </table>
        </div>
        <button class="btn-draw" id="drawBtn" style="margin-top: 30px;">START DRAW</button>
    </section>

    <section class="panel">
        <h2>DRAFT BOARD</h2>
        <div id="displayArea">
            <div style="text-align:center; padding: 100px; color: rgba(255,255,255,0.1); font-size: 2rem;">AWAITING SEEDING...</div>
        </div>
    </section>
</main>

<footer>MADE BY COROIC</footer>

<script>
    const teamColors = {
        "PANTHERS": "#ff0000",
        "CANES": "#cc0000",
        "HURRICANES": "#cc0000",
        "DUCKS": "#f47a38",
        "KRAKEN": "#001628",
        "LIGHTNING": "#002868",
        "RANGERS": "#0038a8",
        "STARS": "#006439",
        "DEFAULT": "#00f2ff"
    };

    let teams = [];

    document.getElementById('addBtn').onclick = () => {
        const name = document.getElementById('nameIn').value.toUpperCase();
        const odds = parseFloat(document.getElementById('oddsIn').value);
        if (name && odds) {
            teams.push({ name, odds });
            updateList();
            document.getElementById('nameIn').value = "";
            document.getElementById('oddsIn').value = "";
        }
    };

    function updateList() {
        const list = document.getElementById('poolTable');
        list.innerHTML = teams.map((t, i) => `
            <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                <td style="padding: 15px 0;">${t.name}</td>
                <td style="color:var(--neon-cyan);">${t.odds}%</td>
                <td style="text-align:right"><button onclick="remove(${i})" style="color:red; background:none; border:none; cursor:pointer; font-size:1.5rem;">✕</button></td>
            </tr>
        `).join('');
    }

    function remove(i) { teams.splice(i, 1); updateList(); }

    document.getElementById('drawBtn').onclick = () => {
        if (teams.length === 0) return;
        const area = document.getElementById('displayArea');
        area.innerHTML = "";
        
        let pool = JSON.parse(JSON.stringify(teams));
        let results = [];

        while (pool.length > 0) {
            let total = pool.reduce((s, t) => s + t.odds, 0);
            let r = Math.random() * total;
            let s = 0;
            for (let i = 0; i < pool.length; i++) {
                s += pool[i].odds;
                if (r <= s) {
                    results.push(pool.splice(i, 1)[0]);
                    break;
                }
            }
        }

        results.reverse().forEach((team, i) => {
            const pickNum = results.length - i;
            const color = teamColors[team.name] || teamColors["DEFAULT"];
            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = `
                <span class="pick-tag">#${pickNum}</span>
                <span class="reveal-hint">CLICK TO REVEAL PICK</span>
                <div class="team-reveal" style="color:${color}; text-shadow: 0 0 30px ${color};">
                    <div style="font-size: 1rem; color: #fff; letter-spacing: 5px; opacity: 0.5;">OVERALL PICK #${pickNum}</div>
                    ${team.name}
                </div>
            `;
            card.onclick = function() {
                this.classList.add('revealed');
                this.style.borderLeft = `15px solid ${color}`;
                this.style.background = `rgba(255,255,255,0.08)`;
            };
            area.appendChild(card);
        });
    };
</script>
</body>
</html>
