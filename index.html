<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNL | S46 DRAFT LOTTERY</title>
    <style>
        :root {
            --hnl-gold: #c9a05a;
            --hnl-red: #C8102E;
            --ice-white: #ffffff;
            --ice-glow: #e6f7ff;
            --text-main: #0a111a;
            --glass-light: rgba(255, 255, 255, 0.7);
        }

        body {
            background-color: var(--ice-glow);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Ultra-Clear Ice Aesthetic */
            background: 
                radial-gradient(circle at 50% 0%, rgba(0, 242, 255, 0.15) 0%, transparent 50%),
                linear-gradient(180deg, var(--ice-white) 0%, var(--ice-glow) 100%);
            background-attachment: fixed;
        }

        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 15px 50px;
            border-bottom: 4px solid var(--hnl-gold);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .hnl-shield {
            background: linear-gradient(135deg, var(--hnl-gold), #b38f53);
            color: white;
            font-weight: 900;
            padding: 12px 18px;
            font-size: 2rem;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            margin-right: 25px;
            box-shadow: 0 0 20px rgba(201, 160, 90, 0.3);
        }

        .title-container h1 { margin: 0; font-size: 1.5rem; letter-spacing: 2px; font-style: italic; }
        .title-container p { margin: 0; color: #8a6d3b; font-size: 0.7rem; font-weight: 800; letter-spacing: 4px; }

        .main-layout { 
            display: grid; 
            grid-template-columns: 380px 1fr; 
            gap: 30px; 
            padding: 40px; 
            max-width: 1500px; 
            margin: auto; 
            flex: 1; 
        }

        .panel {
            background: var(--glass-light);
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        h2 { font-size: 0.75rem; letter-spacing: 3px; color: #666; margin-bottom: 20px; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 8px; }

        .input-box { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        input { 
            padding: 15px; 
            border-radius: 10px; 
            border: 1px solid #ddd; 
            font-size: 1rem; 
            background: #fff;
        }

        .btn-add { background: #f8f9fa; border: 1px solid #ccc; padding: 12px; cursor: pointer; font-weight: 700; border-radius: 10px; transition: 0.2s; }
        .btn-add:hover { background: #e9ecef; border-color: var(--hnl-gold); }

        .btn-main { 
            background: linear-gradient(135deg, var(--hnl-gold), #e0b46a); 
            color: white; 
            width: 100%; 
            padding: 18px; 
            font-size: 1.1rem; 
            font-weight: 900; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(201, 160, 90, 0.3);
            text-transform: uppercase;
        }

        .result-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid #eee;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-card:hover:not(.revealed) { transform: translateX(8px); border-color: #00f2ff; box-shadow: 0 5px 15px rgba(0, 242, 255, 0.1); }

        .reveal-text { color: #00b4bd; font-size: 0.7rem; font-weight: 800; letter-spacing: 2px; }

        .result-card.revealed { animation: revealFlip 0.5s ease forwards; background: #fff; }

        @keyframes revealFlip {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .team-reveal { display: none; font-size: 1.8rem; font-weight: 900; }
        .result-card.revealed .team-reveal { display: block; }
        .result-card.revealed .reveal-text, .result-card.revealed .pick-num { display: none; }

        .pick-num { font-weight: 800; color: #999; }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 0; border-bottom: 1px solid #eee; font-weight: 600; }

        footer { text-align: center; padding: 20px; font-size: 0.8rem; color: #aaa; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>
    <header>
        <div class="hnl-shield">HNL</div>
        <div class="title-container">
            <h1>S46 DRAFT LOTTERY</h1>
            <p>HOCKEY NETWORK LEAGUE OFFICIAL</p>
        </div>
    </header>

    <main class="main-layout">
        <section class="panel">
            <h2>DRAFT MANAGER</h2>
            <div class="input-box">
                <input type="text" id="tName" placeholder="TEAM NAME">
                <input type="number" id="tOdds" placeholder="CHANCE %">
                <button class="btn-add" id="addBtn">ADD TEAM</button>
            </div>
            <div style="max-height: 300px; overflow-y: auto;">
                <table id="tTable"></table>
            </div>
            <button class="btn-main" id="goBtn" style="margin-top:20px;">RUN S46 LOTTERY</button>
        </section>

        <section class="panel">
            <h2>LIVE RESULTS</h2>
            <div id="results">
                <div style="text-align: center; color: #ccc; margin-top: 100px; font-weight: 900;">SYSTEM CLEAR - READY FOR INPUT</div>
            </div>
        </section>
    </main>

    <footer>MADE BY COROIC</footer>

    <script>
        const hnlTeams = {
            "DUCKS": "#F47A38", "BRUINS": "#FFB81C", "SABRES": "#002654",
            "FLAMES": "#C8102E", "CANES": "#CC0000", "HURRICANES": "#CC0000",
            "BLACKHAWKS": "#CF0A2C", "AVALANCHE": "#6F263D", "BLUE JACKETS": "#002654",
            "STARS": "#006439", "RED WINGS": "#CE1126", "EDMONTON": "#041E42",
            "PANTHERS": "#C8102E", // Panthers are RED
            "KINGS": "#111111", "WILD": "#154734",
            "CANADIENS": "#AF1E2D", "PREDATORS": "#FFB81C", "DEVILS": "#CE1126",
            "ISLANDERS": "#00539B", "RANGERS": "#0038A8", "SENATORS": "#C52032",
            "FLYERS": "#F74902", "PENGUINS": "#FCB514", "SHARKS": "#006D75",
            "KRAKEN": "#001628", "BLUES": "#002F87", "LIGHTNING": "#002868",
            "MAPLE LEAFS": "#00205B", "CANUCKS": "#00205B", "GOLDEN KNIGHTS": "#B4975A",
            "CAPITALS": "#041E42", "JETS": "#004C97", "UTAH": "#6CBEEB", "DEFAULT": "#c9a05a"
        };

        let data = [];

        document.getElementById('addBtn').onclick = () => {
            const name = document.getElementById('tName').value.toUpperCase();
            const odds = parseFloat(document.getElementById('tOdds').value);
            if (name && odds) {
                data.push({ name, odds });
                render();
                document.getElementById('tName').value = "";
                document.getElementById('tOdds').value = "";
            }
        };

        function render() {
            const table = document.getElementById('tTable');
            table.innerHTML = data.map((t, i) => `
                <tr><td>${t.name}</td><td style="color:#00b4bd">${t.odds}%</td>
                <td style="text-align:right"><button onclick="del(${i})" style="color:red; border:none; background:none; cursor:pointer;">✕</button></td></tr>
            `).join('');
        }

        function del(i) { data.splice(i, 1); render(); }

        document.getElementById('goBtn').onclick = () => {
            if (data.length === 0) return;
            const res = document.getElementById('results');
            res.innerHTML = "";
            
            let pool = JSON.parse(JSON.stringify(data));
            let order = [];

            while (pool.length > 0) {
                let total = pool.reduce((s, t) => s + t.odds, 0);
                let r = Math.random() * total;
                let s = 0;
                for (let i = 0; i < pool.length; i++) {
                    s += pool[i].odds;
                    if (r <= s) {
                        order.push(pool.splice(i, 1)[0]);
                        break;
                    }
                }
            }

            order.reverse().forEach((team, i) => {
                const pNum = order.length - i;
                const color = hnlTeams[team.name] || hnlTeams["DEFAULT"];
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <span class="pick-num">PICK #${pNum}</span>
                    <span class="reveal-text">CLICK TO REVEAL</span>
                    <div class="team-reveal" style="color:${color}; text-shadow: 0 0 10px ${color}44">
                        <small style="display:block; font-size:0.7rem; color:#999;">PICK #${pNum}</small>
                        ${team.name}
                    </div>
                `;
                card.onclick = function() {
                    if (!this.classList.contains('revealed')) {
                        this.classList.add('revealed');
                        this.style.borderLeft = `10px solid ${color}`;
                    }
                };
                res.appendChild(card);
            });
        };
    </script>
</body>
</html>
