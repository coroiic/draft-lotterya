<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNL | S45 DRAFT LOTTERY</title>
    <style>
        :root {
            --hnl-gold: #c9a05a;
            --hnl-gold-dark: #a67f43;
            --ice-blue-vibrant: #00f2ff;
            --ice-bg: #e6f7ff;
            --text-dark: #0a111a;
            --text-med: #555;
            --panel-glass-light: rgba(255, 255, 255, 0.5);
        }

        body {
            background-color: var(--ice-bg);
            color: var(--text-dark);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Lighter, More Colourful "Glow-Ice" Aesthetic */
            background: 
                radial-gradient(circle at 50% -20%, rgba(0, 242, 255, 0.2) 0%, transparent 60%),
                radial-gradient(circle at 10% 100%, rgba(201, 160, 90, 0.15) 0%, transparent 50%),
                linear-gradient(180deg, #ffffff 0%, var(--ice-bg) 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            padding: 15px 60px;
            border-bottom: 3px solid var(--hnl-gold);
            box-shadow: 0 5px 25px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .hnl-shield {
            background: linear-gradient(135deg, var(--hnl-gold), #b38f53);
            color: #fff;
            font-weight: 900;
            padding: 14px 20px;
            font-size: 2.2rem;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            margin-right: 30px;
            box-shadow: 0 0 25px rgba(201, 160, 90, 0.4);
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            animation: shieldGlow 3s infinite ease-in-out;
        }

        @keyframes shieldGlow {
            0%, 100% { filter: brightness(1); box-shadow: 0 0 25px rgba(201, 160, 90, 0.4); }
            50% { filter: brightness(1.15); box-shadow: 0 0 35px rgba(0, 242, 255, 0.3); }
        }

        .title-container h1 { margin: 0; font-size: 1.6rem; letter-spacing: 3px; font-style: italic; color: var(--text-dark); }
        .title-container p { margin: 0; color: var(--hnl-gold-dark); font-size: 0.75rem; font-weight: 800; letter-spacing: 4px; }

        .live-indicator {
            display: flex;
            align-items: center;
            background: rgba(255, 45, 85, 0.05);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 45, 85, 0.2);
            margin-left: 20px;
        }

        .live-dot {
            height: 9px; width: 9px; background-color: #ff2d55;
            border-radius: 50%; display: inline-block; margin-right: 8px;
            box-shadow: 0 0 12px #ff2d55;
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .main-layout { display: grid; grid-template-columns: 400px 1fr; gap: 40px; padding: 40px; max-width: 1550px; margin: auto; flex: 1; }

        .panel {
            background: var(--panel-glass-light);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 30px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.03);
        }

        h2 { font-size: 0.8rem; letter-spacing: 4px; color: var(--hnl-gold-dark); margin-bottom: 25px; text-transform: uppercase; border-bottom: 1px solid rgba(201, 160, 90, 0.2); padding-bottom: 10px; }

        .entry-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        input { 
            background: rgba(255,255,255,0.7); 
            border: 1px solid rgba(0,0,0,0.05); 
            color: var(--text-dark); 
            padding: 16px; 
            border-radius: 12px; 
            font-size: 0.95rem;
            font-weight: 600;
            transition: 0.2s;
        }
        input:focus { border-color: var(--hnl-gold); outline: none; background: #fff; box-shadow: 0 0 10px rgba(201, 160, 90, 0.1); }

        .btn-add { background: #f0f0f0; color: #333; padding: 14px; border-radius: 12px; border: 1px solid #d9d9d9; cursor: pointer; transition: 0.2s; font-weight: 700; }
        .btn-add:hover { background: #e6f7ff; border-color: var(--ice-blue-vibrant); color: #007780; }

        .btn-generate { 
            background: linear-gradient(135deg, var(--hnl-gold), #e0b46a); 
            color: #fff; 
            width: 100%; 
            padding: 20px; 
            font-size: 1.15rem; 
            font-weight: 900;
            border-radius: 14px;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            box-shadow: 0 8px 20px rgba(201, 160, 90, 0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(201, 160, 90, 0.4); }

        .result-card {
            background: rgba(255, 255, 255, 0.7);
            padding: 28px;
            border-radius: 18px;
            border: 1px solid rgba(0,0,0,0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }

        .result-card:hover:not(.revealed) {
            transform: translateX(10px);
            border-color: var(--ice-blue-vibrant);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 10px 25px rgba(0, 242, 255, 0.1);
        }

        .reveal-tag { color: #0099a3; font-size: 0.75rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }

        .result-card.revealed {
            animation: iceReveal 0.6s ease forwards;
            background: #fff;
            border-color: rgba(0,0,0,0.05);
        }

        @keyframes iceReveal {
            0% { perspective(1000px) rotateX(-90deg); opacity: 0; }
            100% { perspective(1000px) rotateX(0deg); opacity: 1; }
        }

        .team-name-reveal { display: none; font-size: 2rem; font-weight: 900; letter-spacing: 1px; }
        .result-card.revealed .team-name-reveal { display: block; }
        .result-card.revealed .reveal-tag, .result-card.revealed .pick-label { display: none; }

        .pick-label { color: var(--text-med); font-weight: 800; font-size: 1.1rem; }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 14px 0; border-bottom: 1px solid rgba(0,0,0,0.03); font-size: 0.95rem; color: var(--text-dark); }
        
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.75rem;
            color: var(--text-med);
            border-top: 1px solid rgba(0,0,0,0.05);
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
            margin-top: auto;
        }
    </style>
</head>
<body>
    <header>
        <div class="hnl-shield">HNL</div>
        <div class="title-container">
            <h1>S45 DRAFT LOTTERY</h1>
            <p>HOCKEY NETWORK LEAGUE OFFICIAL</p>
        </div>
        <div class="live-indicator">
            <span class="live-dot"></span>
            <span style="font-size: 0.75rem; font-weight: 900; color: #ff2d55;">LIVE</span>
        </div>
    </header>

    <main class="main-layout">
        <section class="panel">
            <h2>COMMISSIONER TOOLS</h2>
            <div class="entry-group">
                <input type="text" id="teamIn" placeholder="TEAM NAME (e.g. CANES)">
                <input type="number" id="oddsIn" placeholder="LOTTERY ODDS %">
                <button class="btn-add" id="addBtn">ADD TO DRAW</button>
            </div>
            
            <div style="max-height: 280px; overflow-y: auto; margin-bottom: 20px; padding-right: 5px;">
                <table>
                    <tbody id="teamList"></tbody>
                </table>
            </div>

            <button class="btn-generate" id="drawBtn">GENERATE DRAFT ORDER</button>
            <button style="background:none; border:none; color:var(--text-med); width:100; cursor:pointer; margin-top:18px; font-size:0.75rem; font-weight:600;" onclick="confirmReset()">RESET ALL DATA</button>
        </section>

        <section class="panel">
            <h2>DRAFT SELECTIONS</h2>
            <div id="resultsArea">
                <div style="text-align: center; color: var(--text-med); margin-top: 130px; font-weight: 900; letter-spacing: 2px; font-size: 0.9rem;">
                    SYSTEM STANDBY: ENTER TEAM DATA
                </div>
            </div>
        </section>
    </main>

    <footer>
        Made by Coroic
    </footer>

    <script>
        // Updated Team Colors: Panthers Set to RED
        const hnlColors = {
            "DUCKS": "#F47A38", "BRUINS": "#FFB81C", "SABRES": "#002654",
            "FLAMES": "#C8102E", "CANES": "#CC0000", "HURRICANES": "#CC0000",
            "BLACKHAWKS": "#CF0A2C", "AVALANCHE": "#6F263D", "BLUE JACKETS": "#002654",
            "STARS": "#006439", "RED WINGS": "#CE1126", "EDMONTON": "#041E42",
            "PANTHERS": "#C8102E", // Panthers are RED (#C8102E is a vibrant hockey red)
            "KINGS": "#111111", "WILD": "#154734",
            "CANADIENS": "#AF1E2D", "PREDATORS": "#FFB81C", "DEVILS": "#CE1126",
            "ISLANDERS": "#00539B", "RANGERS": "#0038A8", "SENATORS": "#C52032",
            "FLYERS": "#F74902", "PENGUINS": "#FCB514", "SHARKS": "#006D75",
            "KRAKEN": "#001628", "BLUES": "#002F87", "LIGHTNING": "#002868",
            "MAPLE LEAFS": "#00205B", "CANUCKS": "#00205B", "GOLDEN KNIGHTS": "#B4975A",
            "CAPITALS": "#041E42", "JETS": "#004C97", "UTAH": "#6CBEEB", "DEFAULT": "#c9a05a"
        };

        let draftEntries = [];

        document.getElementById('addBtn').addEventListener('click', () => {
            const name = document.getElementById('teamIn').value.trim().toUpperCase();
            const odds = parseFloat(document.getElementById('oddsIn').value);
            if (name && !isNaN(odds)) {
                draftEntries.push({ name, odds });
                updateList();
                document.getElementById('teamIn').value = "";
                document.getElementById('oddsIn').value = "";
                document.getElementById('teamIn').focus();
            }
        });

        // Allow 'Enter' key to add teams
        document.getElementById('oddsIn').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') document.getElementById('addBtn').click();
        });

        function updateList() {
            const list = document.getElementById('teamList');
            if (draftEntries.length === 0) {
                list.innerHTML = "";
                return;
            }
            list.innerHTML = draftEntries.map((t, i) => `
                <tr>
                    <td style="font-weight:900; font-size:1.05rem;">${t.name}</td>
                    <td style="color:#008c96; font-weight:bold;">${t.odds}%</td>
                    <td style="text-align:right;"><button onclick="remove(${i})" style="color:#ff2d55; background:none; border:none; cursor:pointer; font-weight:bold; font-size:1.1rem;">✕</button></td>
                </tr>
            `).join('');
        }

        function remove(i) { draftEntries.splice(i, 1); updateList(); }

        document.getElementById('drawBtn').addEventListener('click', () => {
            if (draftEntries.length === 0) return;
            const area = document.getElementById('resultsArea');
            area.innerHTML = `<div style="text-align:center; color:var(--text-med); margin-top:130px; font-weight:bold;">Generating Draft Order...</div>`;
            
            // Short delay for 'processing' feel
            setTimeout(() => {
                area.innerHTML = "";
                let pool = JSON.parse(JSON.stringify(draftEntries));
                let results = [];

                // Weighted lottery algorithm
                while (pool.length > 0) {
                    let total = pool.reduce((s, t) => s + t.odds, 0);
                    let rand = Math.random() * total;
                    let sum = 0;
                    for (let i = 0; i < pool.length; i++) {
                        sum += pool[i].odds;
                        if (rand <= sum) {
                            results.push(pool.splice(i, 1)[0]);
                            break;
                        }
                    }
                }

                // Display from last pick to first for suspense
                results.reverse().forEach((team, i) => {
                    const pickNum = results.length - i;
                    const teamColor = hnlColors[team.name] || hnlColors["DEFAULT"];
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    card.innerHTML = `
                        <span class="pick-label">OVERALL PICK #${pickNum}</span>
                        <span class="reveal-tag">READY FOR REVEAL</span>
                        <div class="team-name-reveal" style="color:${teamColor}; text-shadow: 0 0 15px ${teamColor}66">
                            <span style="font-size: 0.8rem; color: #777; font-weight:700; display: block; margin-bottom: 8px; letter-spacing:1px;">PICK #${pickNum}</span>
                            ${team.name}
                        </div>
                    `;
                    card.onclick = function() {
                        if (!this.classList.contains('revealed')) {
                            this.classList.add('revealed');
                            this.style.borderLeft = `12px solid ${teamColor}`;
                            // Light gradient background based on team color
                            this.style.background = `linear-gradient(90deg, #ffffff, ${teamColor}08)`;
                            this.style.boxShadow = `0 10px 30px ${teamColor}15`;
                        }
                    };
                    area.appendChild(card);
                });
            }, 800);
        });

        function confirmReset() {
            if (confirm("Are you sure you want to clear all team data?")) {
                location.reload();
            }
        }
    </script>
</body>
</html>
